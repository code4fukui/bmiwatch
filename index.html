<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI Watch</title>
  <link rel="stylesheet" href="style.css?v=20260430">
</head>
<body>
  <main class="app">
    <section class="hero">
      <h1>BMI Watch</h1>
      <p class="lead">体重を記録し、目標BMIから計算した目標体重へ近づいているかを確認できます。</p>
    </section>

    <section class="panel">
      <form id="record-form" class="form">
        <label>
          <span>体重 kg</span>
          <input id="weight-input" name="weight" type="number" min="1" max="300" step="0.1" inputmode="decimal" required>
        </label>
        <label>
          <span>身長 cm</span>
          <input id="height-input" name="height" type="number" min="80" max="250" step="0.1" inputmode="decimal" required>
        </label>
        <label>
          <span>目標BMI</span>
          <input id="target-bmi-input" name="targetBmi" type="number" min="10" max="40" step="0.1" inputmode="decimal">
        </label>
        <div class="actions">
          <button type="submit">記録</button>
        </div>
      </form>
    </section>

    <section class="stats">
      <article class="card hero-card">
        <span class="label">現在BMI</span>
        <strong id="current-bmi">-</strong>
        <small id="latest-weight" class="subvalue">まだ記録がありません</small>
      </article>
      <article class="card">
        <span class="label">目標体重</span>
        <strong id="target-weight">-</strong>
      </article>
      <article class="card">
        <span class="label">目標まで</span>
        <strong id="remaining-weight">-</strong>
      </article>
    </section>

    <section class="panel chart-panel">
      <div class="section-head">
        <h2>推移</h2>
      </div>
      <div id="chart-legend" class="chart-legend"></div>
      <svg id="chart" viewBox="0 0 640 320" role="img" aria-label="体重と目標体重の推移グラフ"></svg>
      <p id="chart-empty" class="empty">記録を追加するとグラフが表示されます。</p>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>履歴</h2>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>日時</th>
              <th>体重</th>
              <th>BMI</th>
              <th>目標差</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="records-body"></tbody>
        </table>
      </div>
      <p id="history-empty" class="empty">まだ記録がありません。</p>
    </section>
  </main>

  <template id="record-row-template">
    <tr>
      <td class="time-cell"></td>
      <td class="weight-cell"></td>
      <td class="bmi-cell"></td>
      <td class="diff-cell"></td>
      <td class="row-action">
        <button type="button" class="icon-button delete-button">削除</button>
      </td>
    </tr>
  </template>

  <div class="footer-actions">
    <button type="button" id="import-button" class="secondary">CSVインポート</button>
    <button type="button" id="export-button" class="secondary">CSVエクスポート</button>
    <button type="button" id="reset-button" class="floating-reset secondary">全削除</button>
  </div>
  <input id="import-file-input" type="file" accept=".csv,text/csv" hidden>

  <footer class="page-footer">
    <a href="https://github.com/code4fukui/bmiwatch" target="_blank" rel="noreferrer">src on GitHub</a>
  </footer>

  <script src="main.js?v=20260430"></script>
</body>
</html>
